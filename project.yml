name: UIMole
options:
  bundleIdPrefix: zeroSixteen.br.com
  deploymentTarget:
    macOS: "15.6"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: VVAVW2S9CF
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  UIMole:
    type: application
    platform: macOS
    sources:
      - path: UIMole
    resources:
      - path: UIMole/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: zeroSixteen.br.com.UIMole
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: UIMole/UIMole.entitlements
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
        basedOnDependencyAnalysis: false

  UIMoleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: UIMoleTests
    dependencies:
      - target: UIMole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: zeroSixteen.br.com.UIMoleTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/UIMole.app/Contents/MacOS/UIMole"

  UIMoleUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UIMoleUITests
    dependencies:
      - target: UIMole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: zeroSixteen.br.com.UIMoleUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  UIMole:
    build:
      targets:
        UIMole: all
        UIMoleTests: [test]
        UIMoleUITests: [test]
    test:
      targets:
        - UIMoleTests
        - UIMoleUITests
      gatherCoverageData: true
