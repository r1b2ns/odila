name: UIMole
options:
  deploymentTarget:
    macOS: "15.6"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Development.xcconfig
  Release: Config/Production.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  UIMole:
    type: application
    platform: macOS
    sources:
      - path: UIMole
        excludes:
          - "Resources/Scripts/**"
      - path: Vendor/mole
        type: folder
        buildPhase: resources
      - path: UIMole/Resources/Scripts
        type: folder
        buildPhase: resources
    resources:
      - path: UIMole/Assets.xcassets
    settings:
      base:
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: UIMole/UIMole.entitlements
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
    preBuildScripts:
      - name: Fetch Mole CLI
        script: |
          "${SRCROOT}/Scripts/fetch-mole.sh"
        basedOnDependencyAnalysis: false
      - name: SwiftLint
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Sign embedded Mole binaries
        script: |
          set -e
          MOLE_DIR="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/mole"
          [ -d "$MOLE_DIR" ] || exit 0
          IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-$CODE_SIGN_IDENTITY}"
          [ -n "$IDENTITY" ] || { echo "warning: no code sign identity, skipping"; exit 0; }
          TIMESTAMP_FLAG=""
          if [ "$CONFIGURATION" = "Release" ]; then
            TIMESTAMP_FLAG="--timestamp"
          fi
          find "$MOLE_DIR" -type f -perm +111 -print0 | while IFS= read -r -d '' bin; do
            echo "codesign $bin"
            codesign --force --options runtime $TIMESTAMP_FLAG \
              --sign "$IDENTITY" "$bin"
          done
        basedOnDependencyAnalysis: false

  UIMoleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: UIMoleTests
    dependencies:
      - target: UIMole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID_PREFIX).UIMoleTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/UIMole.app/Contents/MacOS/UIMole"

  UIMoleUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UIMoleUITests
    dependencies:
      - target: UIMole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID_PREFIX).UIMoleUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  UIMole:
    build:
      targets:
        UIMole: all
        UIMoleTests: [test]
        UIMoleUITests: [test]
    test:
      targets:
        - UIMoleTests
        - UIMoleUITests
      gatherCoverageData: true
